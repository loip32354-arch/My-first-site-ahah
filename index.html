<!DOCTYPE html> <!-- это типо версия кода HTML5 всегда с этой залупы начинаешь-->
<html lang="ru"> <!-- это короче язык в конце писать не надо ланг ру ток /html а так это начало твоего сайта-->

<head> <!--Голова это то что не видит пользователь кроме заголовка как я понял тут настройки сайта-->
    <meta charset="utf-8">
    <!--это типо заголовок страницы сверху кодировка-->
    <title>Главный пиздец</title>
    <meta name="author" content="Георгий Ахтырский"> <!-- это автор поисковики будут читать данные мета атрибуты-->
    <meta name="description" content="Тест"> <!-- это описание поисковики тоже будут читать эти данные-->
    <meta name="keywords" content="тест,проверка,html"> <!-- тут ровно так же это ключевые слова-->
</head>
<!--Тело это то что видит пользователь то есть заголовки h1-h2-h3 и тд и то что пишеться под заголовками это тег p он уже не нумируеться-->

<body>
    <!--так пишеться абзацы ну типо заголовок-->
    <h1>Дима умный</h1>
    <p>Дима выжил</p>
    <!--так пишеться абзацы ну типо заголовок-->
    <h2>Дима тупой</h2>
    <p>Дима умер</p>
    <!-- это сыллка на изображение для браузера ПКМ копировать URL картинки-->
    <img src="https://images.meme-arsenal.com/5948ee9f25f1be8cbf7b810ff53efa21.jpg" 
    alt="Тут дима умрет завтра" 
    style="style width 400px"; border-radius: 8px;> <!-- тут описание и разрешение картинки alt описание style 400 пикселей разрешение и на 8 пикселей мы срезаем острые углы-->


</body>
<!--у каждого(почти) тега есть закрывание то есть / типо /p /h2 /html -->

</html><!-- это конец твоей хуйни не забудь про тег /-->
